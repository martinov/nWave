# feature-delta-tier1-sections.yaml
# Single source of truth for the Tier-1 [REF] sections required per wave in
# feature-delta.md. Consumed by:
#   - validate_feature_delta_consistency.py  (R3 enforcement)
#   - nWave/skills/nw-discuss/SKILL.md       (Tier-1 list reference, no longer redeclared)
#   - nWave/skills/nw-design/SKILL.md        (idem)
#   - nWave/skills/nw-devops/SKILL.md        (idem)
#   - nWave/skills/nw-distill/SKILL.md       (idem)
#
# Spec: docs/architecture/feature-delta-schema.md
# Provenance: empirical spikes (2026-05-01) ruled out formatting/token rules;
# this file enforces only identifier-uniqueness, reference-integrity, and
# required-section presence.
schema_version: 1.0

waves:

  DISCUSS:
    required_sections:
      - "Persona ID"
      - "JTBD One-Liner"
      - "Locked Decisions"
      - "User Stories with Elevator Pitches"
      - "Acceptance Criteria"
      - "Definition of Done"
      - "Out-of-Scope"
      - "WS Strategy"
      - "Driving Ports"
      - "Pre-requisites"

  DESIGN:
    required_sections:
      - "DDD List"
      - "Component Decomposition"
      - "Driving Ports"
      - "Driven Ports + Adapters"
      - "Technology Choices"
      - "Decisions Table"
      - "Reuse Analysis"
      - "Open Questions"

  DEVOPS:
    required_sections:
      - "Environment Matrix"
      - "CI/CD Pipeline Outline"
      - "Monitoring Contracts"
      - "Deployment Strategy"
      - "Mutation Testing Strategy"
      - "Observability Stack"
      - "Branching Strategy"
      - "Coexistence Matrix"
      - "Pre-requisites"

  DISTILL:
    required_sections:
      - "Scenario List with Tags"
      - "WS Strategy"
      - "Adapter Coverage Table"
      - "Scaffolds"
      - "Test Placement"
      - "Driving Adapter Coverage"
      - "Pre-requisites"

# ---------------------------------------------------------------------------
# Identifier patterns (R1 + R2 enforcement)
# ---------------------------------------------------------------------------
# Each entry declares:
#   id_regex          : Python re-compatible pattern matching the identifier
#   scope             : "feature-global" (the only currently-supported value)
#   defined_in_wave   : the wave whose [REF] tables/headings define this identifier
#   defined_in_section: the canonical [REF] section where definitions appear
#                       (used for diagnostics; not enforced strictly)
#
# Validators MUST treat any identifier matching id_regex as in-scope for R1
# (uniqueness) and R2 (reference resolution).
identifier_patterns:

  - id: "DD-D{n}"
    id_regex: '\bDD-D\d+\b'
    scope: "feature-global"
    defined_in_wave: "DISCUSS"
    defined_in_section: "Locked Decisions"

  - id: "DD-A{n}"
    id_regex: '\bDD-A\d+\b'
    scope: "feature-global"
    defined_in_wave: "DESIGN"
    defined_in_section: "DDD List"

  - id: "DD-O{n}"
    id_regex: '\bDD-O\d+\b'
    scope: "feature-global"
    defined_in_wave: "DEVOPS"
    defined_in_section: "Decisions Table"

  - id: "DD-T{n}"
    id_regex: '\bDD-T\d+\b'
    scope: "feature-global"
    defined_in_wave: "DISTILL"
    defined_in_section: "Decisions Table"

  - id: "US-{nn}[A-Z]?"
    id_regex: '\bUS-\d{2,}[A-Z]?\b'
    scope: "feature-global"
    defined_in_wave: "DISCUSS"
    defined_in_section: "User Stories with Elevator Pitches"

  - id: "K{n}"
    id_regex: '\bK\d+\b'
    scope: "feature-global"
    defined_in_wave: "DISCUSS"
    defined_in_section: "Outcome KPIs (DISCUSS) or Monitoring Contracts (DEVOPS instrument row)"

  - id: "G{n}"
    id_regex: '\bG\d+[a-z]?\b'
    scope: "feature-global"
    # G identifiers may originate in DESIGN (perf budget) or DEVOPS (monitoring
    # SLO). The definition site is the row in [REF] Technology Choices,
    # [REF] Monitoring Contracts, or [REF] Decisions Table. Lowercase suffix
    # (G1a, G1b) disambiguates same-number budgets that span scopes — see
    # docs/architecture/feature-delta-schema.md Section 6.1 (G1 migration).
    defined_in_wave: "DESIGN_OR_DEVOPS"
    defined_in_section: "Technology Choices | Monitoring Contracts"

  - id: "E{n}"
    id_regex: '\bE\d+\b'
    scope: "feature-global"
    defined_in_wave: "DESIGN_OR_DISTILL"
    defined_in_section: "Decisions Table | Adapter Coverage Table"

  - id: "OQ-{n}"
    id_regex: '\bOQ-\d+\b'
    scope: "feature-global"
    defined_in_wave: "DESIGN"
    defined_in_section: "Open Questions"

  - id: "S{n} (stressor)"
    id_regex: '\bS\d+\b'
    scope: "feature-global"
    defined_in_wave: "DESIGN"
    defined_in_section: "Reuse Analysis or Open Questions (residuality stressors)"

# ---------------------------------------------------------------------------
# External SSOT registries (R2 reference resolution)
# ---------------------------------------------------------------------------
# Identifiers with these prefixes resolve to external files instead of
# in-document definitions. The validator does not parse the external files;
# it just whitelists the prefix. Cross-file integrity is out of scope for
# the feature-delta validator (handled by validate_ssot_propagation.py).
external_registries:
  - prefix: "JOB-"
    source: "docs/product/jobs.yaml"
  - prefix: "JRN-"
    source: "docs/product/journeys/"
  - prefix: "PER-"
    source: "docs/product/personas/"
  - prefix: "ADR-"
    source: "docs/architecture/adr/"
